name: LexiGo
options:
  bundleIdPrefix: com.lexigo
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  postGenCommand: bash fix_xcodeproj.sh

settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1"  # iPhone only
  INFOPLIST_KEY_UIRequiredDeviceCapabilities: []
  INFOPLIST_KEY_UISupportedInterfaceOrientations:
    - UIInterfaceOrientationPortrait
    - UIInterfaceOrientationPortraitUpsideDown
    - UIInterfaceOrientationLandscapeLeft
    - UIInterfaceOrientationLandscapeRight
  INFOPLIST_KEY_UISupportedInterfaceOrientations~iphone:
    - UIInterfaceOrientationPortrait
    - UIInterfaceOrientationPortraitUpsideDown
    - UIInterfaceOrientationLandscapeLeft
    - UIInterfaceOrientationLandscapeRight

packages:
  KokoroCoreML:
    url: https://github.com/Jud/kokoro-coreml.git
    from: 0.8.0
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 11.0.0

targets:
  LexiGo:
    type: application
    platform: iOS
    dependencies:
      - package: KokoroCoreML
        product: KokoroCoreML
      - package: GoogleMobileAds
        product: GoogleMobileAds
    sources:
      - path: LexiGo
        excludes:
          - "project.yml"
      - path: ../classified_webp_150kb/categorized
        group: categorized
        type: folder
        buildPhase: resources
      - path: kokoro_models
        group: KokoroModels
        type: folder
        buildPhase: resources
    info:
      path: LexiGo/Info.plist
      properties:
        CFBundleDisplayName: "LexiGo"
        CFBundleName: "LexiGo"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lexigo.app
        INFOPLIST_FILE: LexiGo/Info.plist
        DEVELOPMENT_TEAM: "FUU4946D45"
